# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 木与宁的小站  #标题
subtitle: ''
description: 选择有时候比努力更重要     #简介或者格言
keywords:
author: 木与宁     #作者
language: zh-CN     #主题语言
timezone: Asia/Shanghai    #中国的时区

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next   #主题改为next

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://zouwenxiang.cn
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 5  # 减少首页文章数量，加快首屏加载
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: git@github.com:hongmuyu/muyblog.git
  branch: main

symbols_count_time:
  symbols: true                # 文章字数统计
  time: true                   # 文章阅读时长
  total_symbols: true          # 站点总字数统计
  total_time: true             # 站点总阅读时长
  exclude_codeblock: false     # 排除代码字数统计
  
  # 文章末尾添加”本文结束”标记
passage_end_tag:
  enabled: true

# 搜索配置优化
search:
  path: search.xml
  field: post
  format: html
  limit: 100
  content: true  # 包含文章全文
  strip_html: true  # 去除HTML标签

# hexo-admin 网页管理界面配置
# 访问地址: http://localhost:4000/admin/
# 密码生成命令: node -e "console.log(require('bcryptjs').hashSync(process.argv[1], 10))" your-password
admin:
  username: admin
  password_hash: '$2a$10$Crpb0xPfxJpxQG8IoL6k3esNL8bruxYj0vba1Nzep6B9MVbhGWStO'
  secret: a3f59c29799c2f3ac1950ac829ee7586ffb3d56c1765f1540246c5ddbedb6db8
  deployCommand: './bin/deploy.sh'  # 使用我们的一键部署脚本

# ============================================
# 性能优化配置
# ============================================

# 字体优化 - 禁用Google Fonts，使用系统字体
font:
  enable: false  # 禁用外部字体加载

# 静态资源压缩
minify:
  enable: true   # 启用HTML压缩
  html:
    remove_comments: true
    collapse_whitespace: true
    collapse_boolean_attributes: true
    remove_redundant_attributes: true
    remove_script_type_attributes: true
    remove_style_link_type_attributes: true

# CSS和JS优化
css_minifier: clean-css
js_minifier: terser

# 缓存配置
cache:
  enable: true
  model: memory
  interval: 30  # 缓存检查间隔（分钟）

# 图片懒加载（通过主题配置）
# 已在 source/_data/styles.styl 中配置

# 预加载关键资源
# 在 source/_data/head.swig 中配置（如需要）

# GitHub Pages兼容性
github_pages:
  cname: zouwenxiang.cn
  enforce_https: true
  jekyll: false  # 禁用Jekyll处理

# 响应式图片配置
responsive_images:
  enable: true
  sizes: [400, 800, 1200, 1600]
  default_size: 800
  quality: 85

# 构建优化
generator:
  cache: true
  workers: 4  # 使用多核CPU加速构建

# 排除不必要的文件
exclude:
  - '*.log'
  - '*.tmp'
  - '*.swp'
  - '*.DS_Store'
  - 'node_modules/**/*'
  - '.git/**/*'
  - '.github/**/*'

# 包含必要的文件
include:
  - 'CNAME'
  - '.nojekyll'
  - 'README.md'
